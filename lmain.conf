# >机场订阅
[Remote Proxy]

# >格式：机场别名 = 机场订阅地址
my = https://zbslovesa.netlify.com
网易云 = https://zbssa.github.io/wyy.list

# >策略组
[Proxy Group]

#Wifi无忧切换 = ssid,default = 节点选择, cellular = 节点选择, "FHY_5G" = DIRECT
海外服务 = select,优选节点,节点,DIRECT
优选节点 = url-test,节点,url=http://www.gstatic.com/generate_204, interval=300, tolerance = 100
#负载均衡 = load-balance,🇭🇰 比特云-香港,url = http://www.gstatic.com/generate_204, interval = 300,max-timeout = 2000,algorithm = pcc
网易云音乐 = select,网易云,DIRECT
大陆服务 = select,DIRECT,海外服务
全球拦截 = select,REJECT,DIRECT

# >筛选订阅节点
[Remote Filter]

节点 = NameKeyword,my, FilterKey = "1"
网易云 = NameKeyword,网易云, FilterKey = "网易云"

# >通过关键字方式筛选
#🇭🇰 比特云-香港 = NameKeyword,比特云, FilterKey = "香港"
# >通过正则方式筛选
#🇭🇰 香港节点 = NameRegex,比特云, FilterKey = "(?i)(港|HK|Hong)"
#🇨🇳 台湾节点 = NameRegex, 比特云, FilterKey = "(?i)(台|TW|Tai)"🇯🇵 日本节点 = NameRegex,比特云, FilterKey = "(?i)(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan)"
#🇰🇷 韩国节点 = NameRegex,比特云, FilterKey = "(?i)(KR|Korea|KOR|首尔|韩|韓)"
#🇺🇲 美国节点 = NameRegex, 比特云,FilterKey = "(?i)(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)"
#🇸🇬 狮城节点 = NameRegex,比特云, FilterKey = "(?i)(新加坡|坡|狮城|SG|Singapore)"


